name: CI / CD — Admin App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build + Test ─────────────────────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build
        env:
          # Supabase public vars needed for Next.js build
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run tests
        run: npm test

  # ── Deploy to Vercel Production (main branch only) ──────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci                    # only deploy if build + tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_RObs4joJG5sJSPY0qD78FEHK
          VERCEL_PROJECT_ID: prj_geG4nCWQpsLDEJxrRnnR4zHLaqUt

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_RObs4joJG5sJSPY0qD78FEHK
          VERCEL_PROJECT_ID: prj_geG4nCWQpsLDEJxrRnnR4zHLaqUt

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_RObs4joJG5sJSPY0qD78FEHK
          VERCEL_PROJECT_ID: prj_geG4nCWQpsLDEJxrRnnR4zHLaqUt
